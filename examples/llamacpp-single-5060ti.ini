# Single RTX 5060 Ti 16GB llama.cpp starter presets.
# These use the same Qwen3.5 9B MTP GGUF file. Keep the MTP and no-MTP
# variants separate when benchmarking so speculative decoding is not blended
# into the baseline.

[Qwen3.5-9B-MTP-Q4-single-5060ti]
model = /path/to/Qwen3.5-9B-UD-Q4_K_XL.gguf
ctx-size = 262144
cache-type-k = q8_0
cache-type-v = q8_0
n-gpu-layers = 99
batch-size = 1024
ubatch-size = 256
flash-attn = on
spec-type = draft-mtp
spec-draft-p-min = 0.75
spec-draft-n-max = 2
jinja = on
parallel = 1
reasoning = off
chat-template-kwargs = {"enable_thinking": false}

[Qwen3.5-9B-Q4-single-5060ti-no-mtp]
model = /path/to/Qwen3.5-9B-UD-Q4_K_XL.gguf
ctx-size = 262144
cache-type-k = q8_0
cache-type-v = q8_0
n-gpu-layers = 99
batch-size = 1024
ubatch-size = 256
flash-attn = on
jinja = on
parallel = 1
reasoning = off
chat-template-kwargs = {"enable_thinking": false}
