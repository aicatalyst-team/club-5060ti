# Conservative single RTX 5060 Ti 16GB llama.cpp starter preset.
# This is a starting config for community testing, not a benchmark result.

[Qwen3.5-9B-MTP-Q4-single-5060ti]
model = /path/to/Qwen3.5-9B-UD-Q4_K_XL.gguf
ctx-size = 131072
cache-type-k = q8_0
cache-type-v = q8_0
n-gpu-layers = 99
batch-size = 1024
ubatch-size = 256
flash-attn = on
spec-type = mtp
spec-draft-n-max = 2
jinja = on
parallel = 1
