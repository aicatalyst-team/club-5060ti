# Single RTX 5060 Ti 16GB GPU-only high-context preset.
# This is the preferred 27B single-card long-context route when you want to
# keep q8 KV instead of dropping the KV cache to q4.
#
# Seed fit checks passed at 262144 context with unified memory disabled.
# The benchmark baseline uses 204800 context to match the high-context seed lane
# while leaving practical headroom.

[Qwen3.6-27B-Q3_K_XL-single-5060ti]
model = /path/to/Qwen3.6-27B-UD-Q3_K_XL.gguf
ctx-size = 204800
cache-type-k = q8_0
cache-type-v = q8_0
n-gpu-layers = 99
batch-size = 512
ubatch-size = 128
flash-attn = on
jinja = on
parallel = 1
reasoning = off
chat-template-kwargs = {"enable_thinking": false}

