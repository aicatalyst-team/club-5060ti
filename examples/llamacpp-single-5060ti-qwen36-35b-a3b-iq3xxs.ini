# Single RTX 5060 Ti 16GB GPU-only long-context presets.
# 204800 is the current benchmark baseline. Native 262144 was also tested as
# a fit/retrieval check, but 204800 leaves more practical headroom.

[Qwen3.6-35B-A3B-IQ3_XXS-single-5060ti]
model = /path/to/Qwen3.6-35B-A3B-UD-IQ3_XXS.gguf
ctx-size = 204800
cache-type-k = q8_0
cache-type-v = q8_0
n-gpu-layers = 99
batch-size = 512
ubatch-size = 128
flash-attn = on
jinja = on
parallel = 1
reasoning = on
reasoning-format = auto
reasoning-budget = 384
chat-template-kwargs = {"enable_thinking": true}

[Qwen3.6-35B-A3B-IQ3_XXS-single-5060ti-native-max]
model = /path/to/Qwen3.6-35B-A3B-UD-IQ3_XXS.gguf
ctx-size = 262144
cache-type-k = q8_0
cache-type-v = q8_0
n-gpu-layers = 99
batch-size = 512
ubatch-size = 128
flash-attn = on
jinja = on
parallel = 1
reasoning = on
reasoning-format = auto
reasoning-budget = 384
chat-template-kwargs = {"enable_thinking": true}
