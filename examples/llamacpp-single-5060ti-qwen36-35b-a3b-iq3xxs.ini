# Single RTX 5060 Ti 16GB GPU-only long-context preset.
# Tested at native 262144 context with q8 KV and a 93636-token
# needle retrieval prompt on the seed card.

[Qwen3.6-35B-A3B-IQ3_XXS-single-5060ti]
model = /path/to/Qwen3.6-35B-A3B-UD-IQ3_XXS.gguf
ctx-size = 262144
cache-type-k = q8_0
cache-type-v = q8_0
n-gpu-layers = 99
batch-size = 512
ubatch-size = 128
flash-attn = on
jinja = on
parallel = 1
