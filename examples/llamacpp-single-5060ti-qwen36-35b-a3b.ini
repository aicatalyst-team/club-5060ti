# Single RTX 5060 Ti 16GB partial-offload fallback preset.
# Prefer the IQ3_XXS GPU-only preset first.

[Qwen3.6-35B-A3B-IQ4_XS-single-5060ti]
model = /path/to/Qwen3.6-35B-A3B-UD-IQ4_XS.gguf
ctx-size = 4096
cache-type-k = q8_0
cache-type-v = q8_0
n-gpu-layers = 32
batch-size = 512
ubatch-size = 128
flash-attn = on
jinja = on
parallel = 1
