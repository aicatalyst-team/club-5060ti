# Single RTX 5060 Ti 16GB GPU-only quality-biased 27B preset.
# Tested at 32768 context with q8 KV. For high context on one 16GB card,
# prefer the Q3_K_XL/q8 KV preset instead of lowering KV cache precision.

[Qwen3.6-27B-IQ4_XS-single-5060ti]
model = /path/to/Qwen3.6-27B-IQ4_XS.gguf
ctx-size = 32768
cache-type-k = q8_0
cache-type-v = q8_0
n-gpu-layers = 99
batch-size = 512
ubatch-size = 128
flash-attn = on
jinja = on
parallel = 1
reasoning = off
chat-template-kwargs = {"enable_thinking": false}
