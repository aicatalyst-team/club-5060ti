# Single RTX 5060 Ti 16GB GPU-only starter preset.
# Tested at 32768 context with q8 KV. 65536 context needed q4 KV on
# the seed card; q4 KV still failed at 98304 and 110080 context.

[Qwen3.6-27B-IQ4_XS-single-5060ti]
model = /path/to/Qwen3.6-27B-IQ4_XS.gguf
ctx-size = 32768
cache-type-k = q8_0
cache-type-v = q8_0
n-gpu-layers = 99
batch-size = 512
ubatch-size = 128
flash-attn = on
jinja = on
parallel = 1
