apiVersion: batch/v1
kind: Job
metadata:
  name: scripts-bench-help
  namespace: club-5060ti
  labels:
    app.kubernetes.io/name: club-5060ti
    app.kubernetes.io/component: scripts
    app.kubernetes.io/managed-by: autopoc
    poc.autopoc.dev/scenario: bench-help
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: club-5060ti
        app.kubernetes.io/component: scripts
        poc.autopoc.dev/scenario: bench-help
    spec:
      containers:
        - name: scripts
          image: quay.io/aicatalyst/club-5060ti-scripts:latest
          imagePullPolicy: Always
          command: ["python3"]
          args: ["scripts/run_openai_bench.py", "--help"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      restartPolicy: Never
